<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resto Landing Page</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="bg-white shadow fixed w-full top-0 z-50">
  <div class="container mx-auto flex justify-between items-center p-4">
    <h1 class="text-xl font-bold">🍽️ Resto</h1>

    <button id="menuBtn" class="md:hidden text-2xl">☰</button>

    <nav id="navMenu" class="hidden md:flex gap-6">
      <a href="#" class="nav-link">Home</a>
      <a href="#menu" class="nav-link">Menu</a>
      <a href="#reserve" class="nav-link">Reservation</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero flex items-center justify-center text-center text-white">
  <div>
    <h2 class="text-4xl font-bold">Delicious Food Awaits</h2>
    <p class="mt-4">Experience the best dining in town</p>
  </div>
</section>

<!-- MENU -->
<section id="menu" class="p-10 mt-10">
  <h2 class="text-3xl font-bold text-center mb-6">Our Menu</h2>

  <!-- FILTER -->
  <div class="flex justify-center gap-4 mb-6 flex-wrap">
    <button class="filterBtn active" data-filter="all">All</button>
    <button class="filterBtn" data-filter="meal">Meals</button>
    <button class="filterBtn" data-filter="drink">Drinks</button>
    <button class="filterBtn" data-filter="dessert">Dessert</button>
  </div>

  <!-- ITEMS -->
  <div class="grid md:grid-cols-3 gap-6">

    <div class="menu-item meal">🍔 Burger</div>
    <div class="menu-item meal">🍝 Pasta</div>
    <div class="menu-item drink">🥤 Juice</div>
    <div class="menu-item drink">☕ Coffee</div>
    <div class="menu-item dessert">🍰 Cake</div>
    <div class="menu-item dessert">🍨 Ice Cream</div>

  </div>
</section>

<!-- RESERVATION -->
<section id="reserve" class="p-10 bg-white">
  <h2 class="text-3xl font-bold text-center mb-6">Book a Table</h2>

  <form id="reservationForm" class="max-w-md mx-auto">
    <input type="text" placeholder="Name" class="form-input" required>
    <input type="email" placeholder="Email" class="form-input" required>
    <input type="date" class="form-input" required>

    <button class="btn-primary">Reserve Now</button>
  </form>

  <p id="successMsg" class="success-msg hidden">
    ✅ Reservation Sent Successfully!
  </p>
</section>

<script src="script.js"></script>
</body>
</html>
